<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Speeder Bike VR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <style>
    #hud {
      position: fixed; top: 20px; left: 20px;
      color: #00ffcc; font-family: 'Courier New', monospace; font-size: 14px;
      background: rgba(0,0,0,0.5); padding: 12px 18px;
      border: 1px solid #00ffcc44; border-radius: 4px;
      z-index: 999; pointer-events: none;
      display: none;
    }
    #hud .label { color: #ffffff88; font-size: 11px; }
    #hud .val   { color: #00ffcc; font-size: 18px; font-weight: bold; }
    #ws-status {
      position: fixed; bottom: 20px; left: 20px;
      font-family: monospace; font-size: 12px;
      padding: 6px 12px; border-radius: 3px;
      z-index: 999; pointer-events: none;
      display: none;
    }
    .connected    { background: #00ff8822; color: #00ff88; border: 1px solid #00ff8844; }
    .disconnected { background: #ff004422; color: #ff4466; border: 1px solid #ff004444; }

    /* ── MENU OVERLAY ── */
    #menu {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0a0a1a;
      z-index: 9999;
      font-family: 'Courier New', monospace;
    }
    #menu h1 {
      color: #00ffcc; font-size: 42px; letter-spacing: 10px;
      margin: 0 0 8px 0; text-shadow: 0 0 30px #00ffcc88;
    }
    #menu .sub {
      color: #ffffff44; font-size: 13px; letter-spacing: 4px;
      margin-bottom: 60px;
    }
    #menu .prompt {
      color: #ffffff; font-size: 16px; letter-spacing: 2px;
      margin-bottom: 12px;
    }
    #menu .hint {
      color: #ffffff44; font-size: 12px; letter-spacing: 1px;
      margin-bottom: 40px;
    }
    #menu-btn {
      background: transparent; border: 1px solid #00ffcc88;
      color: #00ffcc; font-family: 'Courier New', monospace;
      font-size: 14px; letter-spacing: 3px;
      padding: 14px 36px; cursor: pointer;
      transition: all 0.2s;
    }
    #menu-btn:hover {
      background: #00ffcc22; border-color: #00ffcc;
      box-shadow: 0 0 20px #00ffcc44;
    }
    #menu .version {
      position: absolute; bottom: 20px;
      color: #ffffff22; font-size: 11px; letter-spacing: 2px;
    }
  </style>

  <script>
    // ═══════════════════════════════════════════════════
    // REGISTERED IN HEAD — before <a-scene> is parsed
    // ═══════════════════════════════════════════════════
    var aframeSteering = 0;
    var gameStarted    = false;

    function dbgHead(id, val) {
      var el = document.getElementById(id);
      if (el) { el.setAttribute('value', String(val)); }
    }

    // Thumbstick steering — always registered first
    AFRAME.registerComponent('thumbstick-steering', {
      init: function () {
        var self = this;
        function attach() {
          self.el.addEventListener('thumbstickmoved', function (e) {
            aframeSteering = e.detail.x;
            dbgHead('dbg-aframe', 'AFRAME:x=' + e.detail.x.toFixed(2) + ' y=' + e.detail.y.toFixed(2));
          });
          self.el.addEventListener('thumbstickup', function () {
            aframeSteering = 0;
            dbgHead('dbg-aframe', 'AFRAME:released');
          });
          dbgHead('dbg-aframe', 'AFRAME:listening');
        }
        if (this.el.hasLoaded) { attach(); }
        else { this.el.addEventListener('loaded', attach); }
      }
    });

    // Start listener — fires startGame() on trigger pull from either controller
    AFRAME.registerComponent('start-listener', {
      init: function () {
        var self = this;
        function onTrigger() {
          if (!gameStarted) { startGame(); }
        }
        function attach() {
          self.el.addEventListener('triggerdown', onTrigger);
          self.el.addEventListener('gripdown',    onTrigger);
        }
        if (this.el.hasLoaded) { attach(); }
        else { this.el.addEventListener('loaded', attach); }
      }
    });
  </script>
</head>
<body>

<!-- ── MENU OVERLAY ── -->
<div id="menu">
  <h1>SPEEDER BIKE</h1>
  <div class="sub">VR EXERCISE EXPERIENCE</div>
  <div class="prompt">PULL TRIGGER TO START</div>
  <div class="hint">or tap the button below</div>
  <button id="menu-btn" onclick="startGame()">START RIDING</button>
  <div class="version">v0.13 — ALPHA</div>
</div>

<!-- ── HUD (hidden until game starts) ── -->
<div id="hud">
  <div class="label">POWER</div>
  <div class="val" id="hud-power">0 W</div>
  <div class="label" style="margin-top:8px">SPEED</div>
  <div class="val" id="hud-speed">0.0 km/h</div>
  <div class="label" style="margin-top:8px">CADENCE</div>
  <div class="val" id="hud-cadence">0 rpm</div>
</div>
<div id="ws-status" class="disconnected">● WAITING FOR COMPANION APP</div>

<a-scene fog="type: exponential; color: #87ceeb; density: 0.092">

  <a-assets></a-assets>

  <a-sky color="#87ceeb"></a-sky>

  <a-light type="directional" color="#fffbe6" intensity="1.2" position="1 4 -1"></a-light>
  <a-light type="ambient"     color="#c9e8ff" intensity="0.6"></a-light>

  <!-- World — chunks appended here at game start -->
  <a-entity id="world"></a-entity>

  <a-entity id="bike-rig" position="0 0 0">

    <a-entity id="bike-body" position="0 -0.6 -1.2">
      <a-box width="0.5" height="0.2" depth="1.8"
             material="color:#1a1a2e; emissive:#0a0a1a; emissiveIntensity:0.3; roughness:0.3; metalness:0.7">
      </a-box>
      <a-cylinder position="-0.35 0 0.3" radius="0.08" height="1.2" rotation="90 0 0"
                  material="color:#0d0d1a; emissive:#000033; emissiveIntensity:0.5; metalness:0.9">
      </a-cylinder>
      <a-cylinder position="0.35 0 0.3" radius="0.08" height="1.2" rotation="90 0 0"
                  material="color:#0d0d1a; emissive:#000033; emissiveIntensity:0.5; metalness:0.9">
      </a-cylinder>
      <a-sphere id="engine-glow-l" position="-0.35 0 0.9" radius="0.06"
                material="color:#00ccff; emissive:#00ccff; emissiveIntensity:1.0; shader:flat">
      </a-sphere>
      <a-sphere id="engine-glow-r" position="0.35 0 0.9" radius="0.06"
                material="color:#00ccff; emissive:#00ccff; emissiveIntensity:1.0; shader:flat">
      </a-sphere>
      <a-cylinder position="0 0.15 -0.5" radius="0.025" height="0.9" rotation="0 0 90"
                  color="#444466" material="metalness:0.9; roughness:0.2">
      </a-cylinder>
    </a-entity>

    <a-camera id="player-cam" position="0 0 0"
              wasd-controls-enabled="false"
              look-controls="pointerLockEnabled: false">

      <a-entity position="0 -0.3 -1" id="vr-hud">
        <a-text id="vr-power"   value="0 W"      color="#00ffcc" align="left" position="-0.35  0.08 0" width="1.2"></a-text>
        <a-text id="vr-speed"   value="0.0 km/h" color="#ffffff" align="left" position="-0.35  0    0" width="1.2"></a-text>
        <a-text id="vr-cadence" value="0 rpm"    color="#ffffff" align="left" position="-0.35 -0.08 0" width="1.2"></a-text>
      </a-entity>

      <a-entity id="debug-panel" position="0.5 0.1 -1" visible="false">
        <a-plane width="0.55" height="0.8"
                 material="color:#000000; opacity:0.7; transparent:true; shader:flat">
        </a-plane>
        <a-text id="dbg-ws"     value="WS:--"     color="#ffff00" align="left" position="-0.25  0.35 0.01" width="0.55" wrap-count="30"></a-text>
        <a-text id="dbg-raw"    value="RAW:--"    color="#00ffff" align="left" position="-0.25  0.27 0.01" width="0.55" wrap-count="30"></a-text>
        <a-text id="dbg-stored" value="STORED:--" color="#00ffcc" align="left" position="-0.25  0.19 0.01" width="0.55" wrap-count="30"></a-text>
        <a-text id="dbg-pnorm"  value="NORM:--"   color="#ff8800" align="left" position="-0.25  0.11 0.01" width="0.55" wrap-count="30"></a-text>
        <a-text id="dbg-posz"   value="posZ:--"   color="#ff8800" align="left" position="-0.25  0.03 0.01" width="0.55" wrap-count="30"></a-text>
        <a-text id="dbg-chunk"  value="CHUNK:--"  color="#ff8800" align="left" position="-0.25 -0.05 0.01" width="0.55" wrap-count="30"></a-text>
        <a-text id="dbg-gp"     value="GP:none"   color="#ff4444" align="left" position="-0.25 -0.13 0.01" width="0.55" wrap-count="30"></a-text>
        <a-text id="dbg-steer"  value="STEER:--"  color="#ff4444" align="left" position="-0.25 -0.21 0.01" width="0.55" wrap-count="30"></a-text>
        <a-text id="dbg-aframe" value="AFRAME:--" color="#ff88ff" align="left" position="-0.25 -0.29 0.01" width="0.55" wrap-count="30"></a-text>
      </a-entity>

    </a-camera>

    <!-- Controllers — start-listener fires startGame() on trigger -->
    <a-entity id="right-controller"
              oculus-touch-controls="hand: right"
              thumbstick-steering
              start-listener>
    </a-entity>
    <a-entity id="left-controller"
              oculus-touch-controls="hand: left"
              start-listener>
    </a-entity>

  </a-entity>

</a-scene>

<script>
  // ═══════════════════════════════════════════════════
  // CONFIG
  // ═══════════════════════════════════════════════════
  const DEBUG          = true;
  const MAX_POWER      = 150;
  const MAX_SPEED_Z    = 0.8;
  const STEERING_SPEED = 0.04;
  const IDLE_SPEED_Z   = 0.05;
  const WS_PORT        = 8765;

  const CHUNK_LENGTH    = 100;
  const CHUNK_WIDTH     = 50;
  const FOG_OPAQUE_FRAC = 0.5;
  const FOG_COLOR       = '#87ceeb';

  function calcFogDensity() {
    return 4.605 / (CHUNK_LENGTH * FOG_OPAQUE_FRAC);
  }

  // ═══════════════════════════════════════════════════
  // STATE
  // ═══════════════════════════════════════════════════
  let bikeData        = { power: 0, cadence: 0, speed: 0, steering: 0.0 };
  let posX            = 0;
  let posZ            = 0;
  let controllerSteer = 0;

  // ═══════════════════════════════════════════════════
  // HELPERS
  // ═══════════════════════════════════════════════════
  function dbg(id, val) {
    if (!DEBUG) { return; }
    const el = document.getElementById(id);
    if (el) { el.setAttribute('value', String(val)); }
  }

  function updateHUD() {
    const p = bikeData.power;
    const s = (bikeData.speed || 0).toFixed(1);
    const c = Math.round(bikeData.cadence);
    document.getElementById('hud-power').textContent   = `${p} W`;
    document.getElementById('hud-speed').textContent   = `${s} km/h`;
    document.getElementById('hud-cadence').textContent = `${c} rpm`;
    const vp = document.getElementById('vr-power');
    const vs = document.getElementById('vr-speed');
    const vc = document.getElementById('vr-cadence');
    if (vp) { vp.setAttribute('value', `${p} W`); }
    if (vs) { vs.setAttribute('value', `${s} km/h`); }
    if (vc) { vc.setAttribute('value', `${c} rpm`); }
  }

  // ═══════════════════════════════════════════════════
  // CHUNK SYSTEM
  // ═══════════════════════════════════════════════════
  const activeChunks = {};

  function createChunk(index) {
    if (activeChunks[index]) { return; }

    const chunk   = document.createElement('a-entity');
    chunk.setAttribute('id', 'chunk-' + index);

    const centerZ = -(index * CHUNK_LENGTH) - (CHUNK_LENGTH / 2);

    const ground = document.createElement('a-plane');
    ground.setAttribute('position', `0 -1 ${centerZ}`);
    ground.setAttribute('rotation', '-90 0 0');
    ground.setAttribute('width',  CHUNK_WIDTH * 4);
    ground.setAttribute('height', CHUNK_LENGTH);
    ground.setAttribute('material', 'color: #4a7c59; roughness: 0.95');
    chunk.appendChild(ground);

    const rocks = [
      { x: -8,  zOff: -20, r: 1.2 },
      { x:  6,  zOff: -45, r: 0.8 },
      { x: -4,  zOff: -70, r: 1.5 },
      { x:  10, zOff: -85, r: 1.0 },
    ];
    rocks.forEach(function (rp) {
      const rock = document.createElement('a-sphere');
      rock.setAttribute('position', `${rp.x} ${rp.r - 1} ${centerZ + rp.zOff}`);
      rock.setAttribute('radius', String(rp.r));
      rock.setAttribute('material', 'color: #7a6a5a; roughness: 0.99');
      chunk.appendChild(rock);
    });

    document.getElementById('world').appendChild(chunk);
    activeChunks[index] = chunk;
    dbg('dbg-chunk', `LOAD:${index} [${Object.keys(activeChunks)}]`);
  }

  function destroyChunk(index) {
    const chunk = activeChunks[index];
    if (!chunk) { return; }
    chunk.parentNode.removeChild(chunk);
    delete activeChunks[index];
    dbg('dbg-chunk', `UNLOAD:${index} [${Object.keys(activeChunks)}]`);
  }

  function updateChunks() {
    const currentChunk  = Math.floor(posZ / CHUNK_LENGTH);
    const chunkProgress = posZ % CHUNK_LENGTH;

    let chunkA, chunkB;
    if (chunkProgress < CHUNK_LENGTH / 2) {
      chunkA = currentChunk - 1;
      chunkB = currentChunk;
    } else {
      chunkA = currentChunk;
      chunkB = currentChunk + 1;
    }

    createChunk(chunkA);
    createChunk(chunkB);

    Object.keys(activeChunks).forEach(function (key) {
      const idx = parseInt(key);
      if (idx !== chunkA && idx !== chunkB) {
        destroyChunk(idx);
      }
    });
  }

  // ═══════════════════════════════════════════════════
  // WEBSOCKET
  // ═══════════════════════════════════════════════════
  let ws;
  const statusEl = document.getElementById('ws-status');

  function connectWS() {
    const params = new URLSearchParams(window.location.search);
    const wsUrl  = params.get('ws')
      || `ws://${params.get('host') || '192.168.1.100'}:${WS_PORT}`;
    dbg('dbg-ws', 'WS:CONNECTING');
    ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      statusEl.className   = 'connected';
      statusEl.textContent = '● COMPANION CONNECTED';
      dbg('dbg-ws', 'WS:OPEN');
    };
    ws.onmessage = (event) => {
      try {
        const raw = JSON.parse(event.data);
        dbg('dbg-raw', `RAW:p=${raw.power} c=${raw.cadence}`);
        bikeData.power    = raw.power    ?? 0;
        bikeData.cadence  = raw.cadence  ?? 0;
        bikeData.speed    = raw.speed    ?? 0;
        bikeData.steering = raw.steering ?? 0;
        dbg('dbg-stored', `p=${bikeData.power} c=${bikeData.cadence}`);
        updateHUD();
      } catch(e) {
        dbg('dbg-ws', 'WS:PARSE ERR');
      }
    };
    ws.onclose = () => {
      statusEl.className   = 'disconnected';
      statusEl.textContent = '● COMPANION DISCONNECTED — retrying...';
      dbg('dbg-ws', 'WS:CLOSED');
      setTimeout(connectWS, 3000);
    };
    ws.onerror = () => {
      dbg('dbg-ws', 'WS:ERROR');
      ws.close();
    };
  }

  // ═══════════════════════════════════════════════════
  // KEYBOARD FALLBACK
  // ═══════════════════════════════════════════════════
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft')  { controllerSteer = -1; }
    if (e.key === 'ArrowRight') { controllerSteer =  1; }
  });
  document.addEventListener('keyup', (e) => {
    if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') { controllerSteer = 0; }
  });

  // ═══════════════════════════════════════════════════
  // COMPONENTS
  // ═══════════════════════════════════════════════════
  AFRAME.registerComponent('thumbstick-steer', {
    tick() {
      const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
      let found = false;
      for (let i = 0; i < gamepads.length; i++) {
        const gp = gamepads[i];
        if (!gp) { continue; }
        found = true;
        controllerSteer = gp.axes[2] || 0;
        break;
      }
      if (!found) { dbg('dbg-gp', 'GP:none'); }
      dbg('dbg-steer', `raw:${controllerSteer.toFixed(2)} af:${aframeSteering.toFixed(2)}`);
    }
  });

  AFRAME.registerComponent('bike-controller', {
    init() {
      this.world    = document.getElementById('world');
      this.bikeBody = document.getElementById('bike-body');
      this.engineL  = document.getElementById('engine-glow-l');
      this.engineR  = document.getElementById('engine-glow-r');
    },
    tick(time, delta) {
      if (!gameStarted) { return; }

      const powerNorm  = Math.min(bikeData.power / MAX_POWER, 1.0);
      const forwardVel = IDLE_SPEED_Z + powerNorm * (MAX_SPEED_Z - IDLE_SPEED_Z);

      const steer = aframeSteering  !== 0 ? aframeSteering
                  : controllerSteer !== 0 ? controllerSteer
                  : bikeData.steering;

      posX += steer * STEERING_SPEED * (1 + powerNorm * 0.5);
      posX  = Math.max(-14, Math.min(14, posX));
      posZ += forwardVel;

      this.world.object3D.position.x = -posX;
      this.world.object3D.position.z =  posZ;

      updateChunks();

      const targetRoll  = -steer * 0.3;
      const currentRoll = this.bikeBody.object3D.rotation.z;
      this.bikeBody.object3D.rotation.z += (targetRoll - currentRoll) * 0.12;

      const r         = Math.floor(powerNorm * 255);
      const g         = Math.floor(100 + powerNorm * 155);
      const b         = Math.floor(255 - powerNorm * 200);
      const intensity = 0.8 + powerNorm * 0.4;
      const glowMat   = `color:rgb(${r},${g},${b}); emissive:rgb(${r},${g},${b}); emissiveIntensity:${intensity}; shader:flat`;
      this.engineL.setAttribute('material', glowMat);
      this.engineR.setAttribute('material', glowMat);

      dbg('dbg-pnorm', `NORM:${powerNorm.toFixed(3)} vel:${forwardVel.toFixed(3)}`);
      dbg('dbg-posz',  `posZ:${posZ.toFixed(1)} posX:${posX.toFixed(2)}`);
    }
  });

  // ═══════════════════════════════════════════════════
  // START GAME — called by menu button or trigger press
  // ═══════════════════════════════════════════════════
  function startGame() {
    if (gameStarted) { return; }
    gameStarted = true;

    // Hide menu, show HUD
    document.getElementById('menu').style.display    = 'none';
    document.getElementById('hud').style.display     = 'block';
    document.getElementById('ws-status').style.display = 'block';

    // Show debug panel if enabled
    if (DEBUG) {
      const dp = document.getElementById('debug-panel');
      if (dp) { dp.setAttribute('visible', 'true'); }
    }

    // Apply fog density from config
    document.querySelector('a-scene').setAttribute(
      'fog', `type: exponential; color: ${FOG_COLOR}; density: ${calcFogDensity()}`
    );

    // Spawn initial chunks — safe now, scene fully ready
    createChunk(0);
    createChunk(1);

    // Start WebSocket
    connectWS();
  }

  // ═══════════════════════════════════════════════════
  // INIT — only safe stuff at bottom, no chunk creation
  // ═══════════════════════════════════════════════════
  document.querySelector('a-scene').setAttribute('bike-controller', '');
  document.querySelector('a-scene').setAttribute('thumbstick-steer', '');

</script>
</body>
</html>
